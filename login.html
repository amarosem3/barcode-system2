<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLLCALL - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f1219 0%, #1a1f2e 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .login-container { width: 100%; max-width: 440px; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { font-size: 2rem; background: linear-gradient(135deg, #00f2fe, #4facfe); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { color: #6c7a91; font-size: 0.85rem; margin-top: 0.25rem; }
        .login-card {
            background: rgba(30, 36, 51, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .role-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: #1a1f2e;
            border-radius: 60px;
            padding: 0.25rem;
        }
        .role-btn {
            flex: 1;
            text-align: center;
            padding: 0.7rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #8a94a8;
        }
        .role-btn.active {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: #0a0f1f;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.3);
        }
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: #a0a8c0; font-size: 0.85rem; font-weight: 500; }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 0.8rem 1rem;
            transition: all 0.3s ease;
        }
        .input-wrapper:focus-within { border-color: #00f2fe; box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.2); }
        .input-wrapper i { color: #00f2fe; margin-right: 0.8rem; }
        .input-wrapper input { background: transparent; border: none; width: 100%; color: white; font-size: 0.95rem; outline: none; }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            padding: 0.9rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            color: #0a0f1f;
            cursor: pointer;
            margin-top: 1rem;
        }
        .error { color: #f56565; text-align: center; margin-top: 1rem; font-size: 0.85rem; display: none; }
        .register-link { text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #2d3748; font-size: 0.85rem; color: #8a94a8; }
        .register-link a { color: #00f2fe; text-decoration: none; font-weight: 600; }
        .info-text { font-size: 0.7rem; text-align: center; margin-top: 1rem; color: #4a5568; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><h1><i class="fas fa-qrcode"></i> ROLLCALL</h1><p>Attendance Management System</p></div>
        <div class="login-card">
            <div class="role-selector">
                <div class="role-btn" id="lecturerBtn">👨‍🏫 Lecturer</div>
                <div class="role-btn" id="adminBtn">👑 Admin</div>
            </div>
            <form id="loginForm">
                <div class="input-group"><label>Email</label><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Enter your email" required></div></div>
                <div class="input-group"><label>Password</label><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Enter your password" required></div></div>
                <button type="submit" class="login-btn">Login</button>
                <div class="error" id="errorMsg"></div>
            </form>
            <div class="register-link">New lecturer? <a href="register.html">Register here</a></div>
            <div class="info-text"><i class="fas fa-info-circle"></i> Admin: amarosem3@gmail.com</div>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgqq_FVLDrlPew5mvUI84gJtNcNfGQchI",
            authDomain: "rollcall-new-db.firebaseapp.com",
            projectId: "rollcall-new-db",
            storageBucket: "rollcall-new-db.firebasestorage.app",
            messagingSenderId: "803179166995",
            appId: "1:803179166995:web:d55ebffb4bfa934bb2eee6"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const lecturerBtn = document.getElementById('lecturerBtn');
        const adminBtn = document.getElementById('adminBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        lecturerBtn.onclick = () => {
            lecturerBtn.classList.add('active');
            adminBtn.classList.remove('active');
            emailInput.value = '';
            passwordInput.value = '';
        };
        adminBtn.onclick = () => {
            adminBtn.classList.add('active');
            lecturerBtn.classList.remove('active');
            emailInput.value = 'amarosem3@gmail.com';
            passwordInput.value = '';
        };
        lecturerBtn.classList.add('active');

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';
            if (!email || !password) { errorDiv.innerText = 'Enter email and password'; errorDiv.style.display = 'block'; return; }
            try {
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const user = userCred.user;
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists) { await auth.signOut(); errorDiv.innerText = 'User role not found'; errorDiv.style.display = 'block'; return; }
                const role = doc.data().role;
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('uid', user.uid);
                sessionStorage.setItem('role', role);
                window.location.href = role === 'admin' ? 'index.html' : 'lecturer.html';
            } catch (err) { errorDiv.innerText = err.message; errorDiv.style.display = 'block'; }
        };
    </script>
</body>
</html>
