<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLLCALL - Lecturer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* LIGHT THEME (DEFAULT) */
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;
            --border-color: #e2e8f0;
            --accent-color: #0891b2;
            --accent-gradient: linear-gradient(135deg, #0891b2, #0e7490);
            --hover-bg: #f1f5f9;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }
        
        body.dark-theme {
            --bg-primary: #0f1219;
            --bg-secondary: #1a1f2e;
            --bg-card: #1a1f2e;
            --bg-sidebar: #0a0d14;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a8c0;
            --border-color: #1e2433;
            --accent-color: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe, #4facfe);
            --hover-bg: #2a3442;
        }
        
        body {
            background: var(--bg-primary);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100vh;
        }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); }
        .sidebar-header h2 { background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-menu { padding: 1rem 0; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: all 0.3s ease;
        }
        .nav-item:hover, .nav-item.active { background: var(--hover-bg); border-left-color: var(--accent-color); color: var(--accent-color); }
        .main-content { flex: 1; margin-left: 280px; padding: 1.5rem; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .page-title h1 { font-size: 1.5rem; font-weight: 600; }
        .page-title p { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem; }
        .logout-btn {
            background: var(--bg-secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
        }
        .logout-btn:hover { background: var(--error); color: white; }
        .controls {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--border-color);
        }
        .filter-group { display: flex; gap: 0.8rem; }
        select, input {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: var(--text-primary);
        }
        .btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
        }
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            color: white;
        }
        .lecturer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; }
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .card-header {
            background: var(--bg-secondary);
            padding: 1rem;
            border-bottom: 2px solid var(--accent-color);
        }
        .students-list { max-height: 400px; overflow-y: auto; padding: 0.5rem; }
        .student-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0.5rem;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .student-info { flex: 2; }
        .student-semester { font-size: 0.7rem; color: var(--accent-color); margin-top: 0.2rem; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }
        .status-present { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-late { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .status-absent { background: rgba(239,68,68,0.2); color: #ef4444; }
        .card-footer {
            background: var(--bg-secondary);
            padding: 0.6rem;
            text-align: center;
            font-size: 0.75rem;
            border-top: 1px solid var(--border-color);
        }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar-header h2, .nav-item span { display: none; } .main-content { margin-left: 70px; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header"><h2><i class="fas fa-qrcode"></i> ROLLCALL</h2></div>
            <div class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
                <a href="attendance_list.html" class="nav-item"><i class="fas fa-list-ul"></i><span>Attendance Log</span></a>
                <a href="lecturer.html" class="nav-item active"><i class="fas fa-chalkboard-user"></i><span>Lecturer View</span></a>
                <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
            </div>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <div><h1>Lecturer Dashboard</h1><p>Class attendance summary</p></div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <div class="controls">
                <div class="filter-group">
                    <select id="classFilter"><option value="all">All Classes</option></select>
                    <input type="text" id="searchInput" placeholder="Search student...">
                </div>
                <button class="btn" onclick="loadData()">Refresh</button>
                <button class="btn btn-primary" id="downloadWeeklyBtn">📥 Weekly Report</button>
            </div>
            <div id="lecturerGrid" class="lecturer-grid">Loading...</div>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgqq_FVLDrlPew5mvUI84gJtNcNfGQchI",
            authDomain: "rollcall-new-db.firebaseapp.com",
            projectId: "rollcall-new-db",
            storageBucket: "rollcall-new-db.firebasestorage.app",
            messagingSenderId: "803179166995",
            appId: "1:803179166995:web:d55ebffb4bfa934bb2eee6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // ============ THEME ============
        function applyTheme(theme) {
            if (theme === 'dark') document.body.classList.add('dark-theme');
            else if (theme === 'light') document.body.classList.remove('dark-theme');
            else if (theme === 'system') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (prefersDark) document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }
        }
        const savedTheme = localStorage.getItem('rollcall_theme') || 'light';
        applyTheme(savedTheme);
        
        if (!sessionStorage.getItem('loggedIn')) window.location.href = 'login.html';
        document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
        
        const lecturerNames = { "DFK1A":"Dr Ahmad","DFK1B":"Pn Siti","DFK2A":"En Rizal","DFK2B":"Pn Zuraidah","DFK3A":"Dr Farah","DFK3B":"En Hafiz","DFK4A":"Pn Aisyah","DFK4B":"Dr Kamarul","DFK5A":"En Azman","DFK5B":"Pn Nor Azlina","DFK6A":"Dr Liza","DFK6B":"En Hakimi","DFK7A":"Pn Rosnah","DFK7B":"Dr Amir" };
        let allStudents = [], allAttendance = [];
        
        async function loadData() {
            const s = await db.collection('students').get(); allStudents = []; s.forEach(d=>allStudents.push({id:d.id,...d.data()}));
            const a = await db.collection('attendance').get(); allAttendance = []; a.forEach(d=>allAttendance.push({id:d.id,...d.data()}));
            render();
        }
        
        function render() {
            const filter = document.getElementById('classFilter').value, search = document.getElementById('searchInput').value.toLowerCase();
            const byClass = {};
            allStudents.forEach(s=>{ let c=s.class||"No Class"; if(!byClass[c]) byClass[c]=[]; byClass[c].push(s); });
            const attMap = {}; allAttendance.forEach(a=>attMap[a.student_id]=a);
            let classes = Object.keys(byClass).sort();
            if(filter!=='all') classes = classes.filter(c=>c===filter);
            let html = '';
            for(let cls of classes){
                let students = byClass[cls];
                if(search) students = students.filter(s=>s.student_name.toLowerCase().includes(search));
                if(!students.length) continue;
                let present=0, late=0, stuHtml='';
                students.forEach(s=>{
                    const att = attMap[s.student_id];
                    let status = att ? att.status : 'absent';
                    if(status==='present') present++;
                    else if(status==='late') late++;
                    const sc = status==='present'?'present':(status==='late'?'late':'absent');
                    const st = status==='present'?'Present':(status==='late'?'Late':'Absent');
                    const ic = status==='present'?'fa-check-circle':(status==='late'?'fa-clock':'fa-times-circle');
                    stuHtml += `<div class="student-row"><div class="student-info"><strong>${escapeHtml(s.student_name)}</strong><div class="student-semester"><i class="fas fa-book"></i> Sem ${s.semester||'?'}</div></div><span class="status-badge status-${sc}"><i class="fas ${ic}"></i> ${st}</span></div>`;
                });
                html += `<div class="card"><div class="card-header"><h3>📚 ${cls}</h3><p><i class="fas fa-user-tie"></i> ${lecturerNames[cls]||"Staff"}</p></div><div class="students-list">${stuHtml}</div><div class="card-footer"><strong>${present} present</strong> ${late?`| ${late} late`:''} / ${students.length} total</div></div>`;
            }
            document.getElementById('lecturerGrid').innerHTML = html || '<div class="no-data">No data available</div>';
        }
        
        function escapeHtml(str) { return String(str||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        
        document.getElementById('downloadWeeklyBtn').onclick = async () => {
            const now = new Date(), day = now.getDay();
            const mon = new Date(now); mon.setDate(now.getDate()+(day===0?-6:1-day)); mon.setHours(0,0,0,0);
            const sun = new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
            const snap = await db.collection('attendance').where('scanned_at','>=',mon).where('scanned_at','<=',sun).get();
            if(snap.empty) { alert('No records this week'); return; }
            let csv = [['Name','ID','Class','Sem','Date','Status','Time']];
            snap.forEach(d=>{ let rec=d.data(); let stu=allStudents.find(s=>s.student_id===rec.student_id)||{}; let dt=rec.scanned_at?new Date(rec.scanned_at.getTime()+8*3600000).toLocaleDateString():''; let tm=rec.scanned_at?new Date(rec.scanned_at.getTime()+8*3600000).toLocaleTimeString():''; csv.push([stu.student_name||rec.student_name||'', rec.student_id||'', stu.class||'', stu.semester||'', dt, rec.status, tm]); });
            const blob = new Blob(["\uFEFF"+csv.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n')], {type:'text/csv'});
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `weekly_report.csv`; link.click(); URL.revokeObjectURL(link.href);
        };
        
        document.getElementById('classFilter').onchange = render;
        document.getElementById('searchInput').oninput = render;
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
