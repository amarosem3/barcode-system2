<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ROLLCALL - Lecturer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1219;
            font-family: 'Inter', sans-serif;
            color: #e0e0e0;
        }
        
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: #0a0d14;
            border-right: 1px solid #1e2433;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #1e2433;
        }
        
        .sidebar-header h2 {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.5rem;
        }
        
        .sidebar-header p {
            font-size: 0.75rem;
            color: #4a5568;
            margin-top: 0.25rem;
        }
        
        .nav-menu {
            padding: 1rem 0;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            color: #a0a8c0;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background: #1a1f2e;
            color: #00f2fe;
        }
        
        .nav-item.active {
            background: #1a1f2e;
            border-left-color: #00f2fe;
            color: #00f2fe;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 1.5rem;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #1e2433;
        }
        
        .page-title h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .page-title p {
            color: #6c7a91;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        
        .logout-btn {
            background: #1e2433;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .controls {
            background: #1a1f2e;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            border: 1px solid #1e2433;
        }
        
        .filter-group {
            display: flex;
            gap: 0.8rem;
        }
        
        select, input {
            background: #2a3442;
            border: 1px solid #3a4557;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: #e0e0e0;
        }
        
        .btn {
            background: #2a3442;
            border: 1px solid #3a4557;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border-color: transparent;
            color: #0a0f1f;
        }
        
        .lecturer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.5rem;
        }
        
        .card {
            background: #1a1f2e;
            border-radius: 12px;
            border: 1px solid #1e2433;
            overflow: hidden;
        }
        
        .card-header {
            background: #151b26;
            padding: 1rem 1.25rem;
            border-bottom: 2px solid #00f2fe;
        }
        
        .card-header h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }
        
        .card-header p {
            font-size: 0.75rem;
            color: #6c7a91;
        }
        
        .students-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 0.5rem;
        }
        
        .student-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0.5rem;
            border-bottom: 1px solid #1e2433;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .student-info {
            flex: 2;
        }
        
        .student-info strong {
            font-size: 0.85rem;
        }
        
        .student-semester {
            font-size: 0.7rem;
            color: #00f2fe;
            margin-top: 0.2rem;
        }
        
        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        
        .status-present {
            background: rgba(0, 230, 118, 0.2);
            color: #00e676;
        }
        
        .status-late {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .status-absent {
            background: rgba(255, 23, 68, 0.2);
            color: #ff8a8a;
        }
        
        .card-footer {
            background: #151b26;
            padding: 0.6rem;
            text-align: center;
            font-size: 0.75rem;
            border-top: 1px solid #1e2433;
        }
        
        .no-data {
            text-align: center;
            padding: 2rem;
            color: #6c7a91;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .sidebar-header h2, .sidebar-header p, .nav-item span {
                display: none;
            }
            .nav-item {
                justify-content: center;
                padding: 0.75rem;
            }
            .main-content {
                margin-left: 70px;
            }
            .lecturer-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-qrcode"></i> ROLLCALL</h2>
                <p>Lecturer Panel</p>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-item active">
                    <i class="fas fa-chalkboard-user"></i>
                    <span>Dashboard</span>
                </a>
                <a href="attendance_list.html" class="nav-item">
                    <i class="fas fa-list-ul"></i>
                    <span>Attendance Log</span>
                </a>
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
            </div>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1>Lecturer Dashboard</h1>
                    <p>View class attendance summary</p>
                </div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            
            <div class="controls">
                <div class="filter-group">
                    <select id="classFilter"><option value="all">All Classes</option></select>
                    <input type="text" id="searchInput" placeholder="Search student...">
                </div>
                <button class="btn" onclick="loadData()"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="btn btn-primary" id="downloadWeeklyReportBtn"><i class="fas fa-download"></i> Weekly Report</button>
            </div>
            
            <div id="lecturerGrid" class="lecturer-grid">Loading...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgqq_FVLDrlPew5mvUI84gJtNcNfGQchI",
            authDomain: "rollcall-new-db.firebaseapp.com",
            projectId: "rollcall-new-db",
            storageBucket: "rollcall-new-db.firebasestorage.app",
            messagingSenderId: "803179166995",
            appId: "1:803179166995:web:d55ebffb4bfa934bb2eee6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        if (!sessionStorage.getItem('loggedIn')) window.location.href = 'login.html';
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.clear();
            window.location.href = 'login.html';
        });
        
        const lecturerNames = {
            "DFK1A": "Dr. Ahmad Faizal", "DFK1B": "Pn. Siti Aminah", "DFK2A": "En. Mohd Rizal",
            "DFK2B": "Pn. Zuraidah", "DFK3A": "Dr. Farah Izzati", "DFK3B": "En. Hafizuddin",
            "DFK4A": "Pn. Aisyah Humaira", "DFK4B": "Dr. Kamarul Azman", "DFK5A": "En. Azman Hafiz",
            "DFK5B": "Pn. Nor Azlina", "DFK6A": "Dr. Liza Marlina", "DFK6B": "En. Hakimi",
            "DFK7A": "Pn. Rosnah", "DFK7B": "Dr. Amir Hamzah"
        };
        
        let allStudents = [], allAttendance = [];
        
        async function loadData() {
            const studentsSnap = await db.collection('students').get();
            allStudents = [];
            studentsSnap.forEach(doc => allStudents.push({ id: doc.id, ...doc.data() }));
            
            const attendanceSnap = await db.collection('attendance').get();
            allAttendance = [];
            attendanceSnap.forEach(doc => allAttendance.push({ id: doc.id, ...doc.data() }));
            
            renderClasses();
        }
        
        function renderClasses() {
            const classFilter = document.getElementById('classFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const byClass = {};
            
            allStudents.forEach(s => {
                let cls = s.class || "No Class";
                if (!byClass[cls]) byClass[cls] = [];
                byClass[cls].push(s);
            });
            
            const attendanceMap = {};
            allAttendance.forEach(a => attendanceMap[a.student_id] = a);
            
            let classes = Object.keys(byClass).sort();
            if (classFilter !== 'all') classes = classes.filter(c => c === classFilter);
            
            let html = '';
            for (let cls of classes) {
                let students = byClass[cls];
                if (search) students = students.filter(s => s.student_name.toLowerCase().includes(search));
                if (!students.length) continue;
                
                let presentCount = 0, lateCount = 0;
                let studentsHtml = '';
                
                students.forEach(s => {
                    const att = attendanceMap[s.student_id];
                    let status = att ? att.status : 'absent';
                    if (status === 'present') presentCount++;
                    else if (status === 'late') lateCount++;
                    
                    const statusClass = status === 'present' ? 'present' : (status === 'late' ? 'late' : 'absent');
                    const statusText = status === 'present' ? 'Present' : (status === 'late' ? 'Late' : 'Absent');
                    const statusIcon = status === 'present' ? 'fa-check-circle' : (status === 'late' ? 'fa-clock' : 'fa-times-circle');
                    
                    studentsHtml += `
                        <div class="student-row">
                            <div class="student-info">
                                <strong>${escapeHtml(s.student_name)}</strong>
                                <div class="student-semester"><i class="fas fa-book"></i> Semester ${s.semester || '?'}</div>
                            </div>
                            <span class="status-badge status-${statusClass}">
                                <i class="fas ${statusIcon}"></i> ${statusText}
                            </span>
                        </div>
                    `;
                });
                
                html += `
                    <div class="card">
                        <div class="card-header">
                            <h3><i class="fas fa-chalkboard"></i> ${cls}</h3>
                            <p><i class="fas fa-user-tie"></i> ${lecturerNames[cls] || "Staff"}</p>
                        </div>
                        <div class="students-list">${studentsHtml}</div>
                        <div class="card-footer">
                            <strong>${presentCount} present</strong> ${lateCount ? `| ${lateCount} late` : ''} / ${students.length} total
                        </div>
                    </div>
                `;
            }
            document.getElementById('lecturerGrid').innerHTML = html || '<div class="no-data">No data available</div>';
        }
        
        function escapeHtml(str) { 
            if (!str) return ''; 
            return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); 
        }
        
        // Weekly Report
        document.getElementById('downloadWeeklyReportBtn').addEventListener('click', async () => {
            const now = new Date();
            const day = now.getDay();
            const monday = new Date(now);
            monday.setDate(now.getDate() + (day === 0 ? -6 : 1 - day));
            monday.setHours(0,0,0,0);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23,59,59,999);
            
            const snapshot = await db.collection('attendance')
                .where('scanned_at', '>=', monday)
                .where('scanned_at', '<=', sunday)
                .get();
            
            const records = [];
            snapshot.forEach(doc => records.push(doc.data()));
            if (!records.length) { alert('No attendance records for this week'); return; }
            
            const csvRows = [['Student Name', 'Student ID', 'Class', 'Semester', 'Date', 'Status', 'Scan Time']];
            for (const rec of records) {
                let stu = allStudents.find(s => s.student_id === rec.student_id) || {};
                let date = rec.scanned_at ? new Date(rec.scanned_at.getTime() + (8 * 60 * 60 * 1000)).toLocaleDateString() : '';
                let time = rec.scanned_at ? new Date(rec.scanned_at.getTime() + (8 * 60 * 60 * 1000)).toLocaleTimeString() : '';
                csvRows.push([
                    stu.student_name || rec.student_name || '',
                    rec.student_id || '',
                    stu.class || '',
                    stu.semester || '',
                    date,
                    rec.status === 'present' ? 'Present' : 'Late',
                    time
                ]);
            }
            const csvContent = csvRows.map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.setAttribute('download', `weekly_report_${monday.toISOString().split('T')[0]}.csv`);
            link.click();
            URL.revokeObjectURL(link.href);
        });
        
        document.getElementById('classFilter').addEventListener('change', renderClasses);
        document.getElementById('searchInput').addEventListener('input', renderClasses);
        
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
