<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLLCALL - Attendance Log</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* LIGHT THEME (DEFAULT) */
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;
            --border-color: #e2e8f0;
            --accent-color: #0891b2;
            --accent-gradient: linear-gradient(135deg, #0891b2, #0e7490);
            --hover-bg: #f1f5f9;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }
        
        body.dark-theme {
            --bg-primary: #0f1219;
            --bg-secondary: #1a1f2e;
            --bg-card: #1a1f2e;
            --bg-sidebar: #0a0d14;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a8c0;
            --border-color: #1e2433;
            --accent-color: #00f2fe;
            --accent-gradient: linear-gradient(135deg, #00f2fe, #4facfe);
            --hover-bg: #2a3442;
        }
        
        body {
            background: var(--bg-primary);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100vh;
        }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); }
        .sidebar-header h2 { background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-menu { padding: 1rem 0; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: all 0.3s ease;
        }
        .nav-item:hover, .nav-item.active { background: var(--hover-bg); border-left-color: var(--accent-color); color: var(--accent-color); }
        .main-content { flex: 1; margin-left: 280px; padding: 1.5rem; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .page-title h1 { font-size: 1.5rem; font-weight: 600; }
        .page-title p { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem; }
        .logout-btn {
            background: var(--bg-secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
        }
        .logout-btn:hover { background: var(--error); color: white; }
        .controls {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--border-color);
        }
        .date-filter { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
        input, select {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: var(--text-primary);
        }
        .btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
        }
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            color: white;
        }
        .btn-danger {
            background: var(--error);
            border: none;
            color: white;
        }
        .attendance-table {
            background: var(--bg-card);
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th {
            text-align: left;
            padding: 0.9rem 1rem;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border-bottom: 2px solid var(--accent-color);
        }
        td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border-color); }
        tr:hover td { background: var(--hover-bg); }
        .date-group-header td { background: var(--hover-bg); font-weight: 600; color: var(--accent-color); }
        .badge-present { background: rgba(16,185,129,0.2); color: #10b981; padding: 0.2rem 0.6rem; border-radius: 20px; display: inline-block; }
        .badge-late { background: rgba(245,158,11,0.2); color: #f59e0b; padding: 0.2rem 0.6rem; border-radius: 20px; display: inline-block; }
        .delete-record-btn { background: var(--error); border: none; color: white; padding: 0.3rem 0.6rem; border-radius: 6px; cursor: pointer; }
        .toast-msg { position: fixed; bottom: 20px; right: 20px; background: var(--success); color: white; padding: 0.75rem 1.25rem; border-radius: 10px; display: none; z-index: 1000; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar-header h2, .nav-item span { display: none; } .main-content { margin-left: 70px; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header"><h2><i class="fas fa-qrcode"></i> ROLLCALL</h2></div>
            <div class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
                <a href="attendance_list.html" class="nav-item active"><i class="fas fa-list-ul"></i><span>Attendance Log</span></a>
                <a href="lecturer.html" class="nav-item"><i class="fas fa-chalkboard-user"></i><span>Lecturer View</span></a>
                <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
            </div>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <div><h1>Attendance Log</h1><p>View and manage attendance records</p></div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <div class="controls">
                <div class="date-filter">
                    <input type="date" id="startDate"> to <input type="date" id="endDate">
                    <button class="btn" onclick="loadAttendance()">Filter</button>
                    <button class="btn" onclick="resetDates()">Reset</button>
                    <button class="btn btn-primary" id="downloadCsvBtn">📥 CSV</button>
                    <button class="btn btn-primary" id="downloadWeeklyBtn">📅 Weekly</button>
                    <button class="btn btn-danger" id="resetWeeklyBtn">🗑️ Reset Week</button>
                </div>
                <div>Total: <strong id="totalRecords">0</strong></div>
            </div>
            <div class="attendance-table">
                <table>
                    <thead><tr><th>#</th><th>Student Name</th><th>Student ID</th><th>IC</th><th>Class</th><th>Status</th><th>Time</th><th>Action</th></tr></thead>
                    <tbody id="attendanceBody"><tr><td colspan="8">Loading...<\/td><\/tr> </tbody>
                </table>
            </div>
        </div>
    </div>
    <div id="toastMsg" class="toast-msg"></div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgqq_FVLDrlPew5mvUI84gJtNcNfGQchI",
            authDomain: "rollcall-new-db.firebaseapp.com",
            projectId: "rollcall-new-db",
            storageBucket: "rollcall-new-db.firebasestorage.app",
            messagingSenderId: "803179166995",
            appId: "1:803179166995:web:d55ebffb4bfa934bb2eee6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // ============ THEME ============
        function applyTheme(theme) {
            if (theme === 'dark') document.body.classList.add('dark-theme');
            else if (theme === 'light') document.body.classList.remove('dark-theme');
            else if (theme === 'system') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (prefersDark) document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }
        }
        const savedTheme = localStorage.getItem('rollcall_theme') || 'light';
        applyTheme(savedTheme);
        
        if (!sessionStorage.getItem('loggedIn')) window.location.href = 'login.html';
        document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
        
        let studentMap = new Map();
        let allRecords = [];
        
        async function loadStudentMap() {
            const snap = await db.collection('students').get();
            studentMap.clear();
            snap.forEach(doc => { const d = doc.data(); studentMap.set(d.student_id, { name: d.student_name, ic: d.ic_number, class: d.class || 'N/A' }); });
        }
        
        function showToast(msg) { const t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        
        async function deleteRecord(id) {
            if(!confirm('Delete this record?')) return;
            await db.collection('attendance').doc(id).delete();
            showToast('✅ Deleted');
            loadAttendance();
        }
        
        // ============ OPTIMIZED LOAD ATTENDANCE (with limit 100) ============
        async function loadAttendance() {
            const tbody = document.getElementById('attendanceBody');
            tbody.innerHTML = '<tr><td colspan="8">Loading...<\/td><\/tr>';
            
            // OPTIMIZED: limit to last 100 records for fast loading
            let snapshot = await db.collection('attendance')
                .orderBy('scanned_at', 'desc')
                .limit(100)
                .get();
            
            let records = [];
            snapshot.forEach(doc => {
                let d = doc.data();
                let ts = d.scanned_at ? d.scanned_at.toDate() : null;
                records.push({ id: doc.id, ...d, scanned_at: ts });
            });
            
            // Apply date filters
            let start = document.getElementById('startDate').value;
            let end = document.getElementById('endDate').value;
            if(start) { let s = new Date(start+'T00:00:00+08:00'); records = records.filter(r => r.scanned_at && r.scanned_at >= s); }
            if(end) { let e = new Date(end+'T23:59:59+08:00'); records = records.filter(r => r.scanned_at && r.scanned_at <= e); }
            
            records.sort((a,b) => (b.scanned_at||0) - (a.scanned_at||0));
            allRecords = records;
            document.getElementById('totalRecords').innerText = records.length;
            
            if(!records.length) { tbody.innerHTML = '<tr><td colspan="8">No records<\/td><\/tr>'; return; }
            
            // Group by date using Malaysia time
            const grouped = {};
            records.forEach(rec => {
                let dk = rec.scanned_at ? new Date(rec.scanned_at.getTime()+8*3600000).toISOString().split('T')[0] : 'Unknown';
                if(!grouped[dk]) grouped[dk] = [];
                grouped[dk].push(rec);
            });
            
            let html = '', cnt = 1;
            for(let date of Object.keys(grouped).sort().reverse()){
                let display = new Date(date+'T00:00:00+08:00').toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
                html += `<tr class="date-group-header"><td colspan="8"><i class="fas fa-calendar-day"></i> ${display} (${grouped[date].length})<\/td><\/tr>`;
                grouped[date].forEach(rec => {
                    let stu = studentMap.get(rec.student_id) || {};
                    let time = rec.scanned_at ? rec.scanned_at.toLocaleTimeString('en-MY',{timeZone:'Asia/Kuala_Lumpur',hour:'2-digit',minute:'2-digit',hour12:true}) : '?';
                    let badge = rec.status === 'present' ? 'badge-present' : 'badge-late';
                    let icon = rec.status === 'present' ? 'fa-check-circle' : 'fa-clock';
                    html += `<tr>
                        <td>${cnt++}<\/td>
                        <td>${escapeHtml(stu.name||rec.student_name||'?')}<\/td>
                        <td>${escapeHtml(rec.student_id||'-')}<\/td>
                        <td>${escapeHtml(stu.ic||rec.ic_number||'-')}<\/td>
                        <td>${escapeHtml(stu.class||'N/A')}<\/td>
                        <td><span class="${badge}"><i class="fas ${icon}"></i> ${rec.status}<\/span><\/td>
                        <td>${time}<\/td>
                        <td><button class="delete-record-btn" data-id="${rec.id}"><i class="fas fa-trash"><\/i><\/button><\/td>
                    <\/tr>`;
                });
            }
            tbody.innerHTML = html;
            document.querySelectorAll('.delete-record-btn').forEach(btn => { btn.onclick = () => deleteRecord(btn.dataset.id); });
        }
        
        function escapeHtml(str) { return String(str||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function resetDates() { document.getElementById('startDate').value = ''; document.getElementById('endDate').value = ''; loadAttendance(); }
        
        document.getElementById('downloadCsvBtn').onclick = () => {
            if(!allRecords.length) return showToast('No data');
            let csv = [['Name','ID','IC','Class','Status','Date','Time']];
            allRecords.forEach(r => { let stu = studentMap.get(r.student_id)||{}; let d = r.scanned_at ? new Date(r.scanned_at.getTime()+8*3600000).toLocaleDateString() : ''; let t = r.scanned_at ? new Date(r.scanned_at.getTime()+8*3600000).toLocaleTimeString() : ''; csv.push([stu.name||r.student_name||'', r.student_id||'', stu.ic||r.ic_number||'', stu.class||'', r.status, d, t]); });
            const blob = new Blob(["\uFEFF"+csv.map(row=>row.map(c=>`"${c}"`).join(',')).join('\n')], {type:'text/csv'});
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `attendance.csv`; link.click(); URL.revokeObjectURL(link.href); showToast('CSV downloaded');
        };
        
        document.getElementById('downloadWeeklyBtn').onclick = async () => {
            const now = new Date(), day = now.getDay();
            const mon = new Date(now); mon.setDate(now.getDate()+(day===0?-6:1-day)); mon.setHours(0,0,0,0);
            const sun = new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
            const snap = await db.collection('attendance').where('scanned_at','>=',mon).where('scanned_at','<=',sun).get();
            if(snap.empty) return showToast('No data this week');
            let csv = [['Name','ID','Class','Date','Status']];
            snap.forEach(d=>{ let da = d.data(); let stu = studentMap.get(da.student_id)||{}; let dt = da.scanned_at ? new Date(da.scanned_at.getTime()+8*3600000).toLocaleDateString() : ''; csv.push([stu.name||da.student_name||'', da.student_id||'', stu.class||'', dt, da.status]); });
            const blob = new Blob(["\uFEFF"+csv.map(row=>row.map(c=>`"${c}"`).join(',')).join('\n')], {type:'text/csv'});
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `weekly_report.csv`; link.click(); URL.revokeObjectURL(link.href); showToast('Weekly report downloaded');
        };
        
        document.getElementById('resetWeeklyBtn').onclick = async () => {
            if(!confirm('Delete ALL records this week?')) return;
            const now = new Date(), day = now.getDay();
            const mon = new Date(now); mon.setDate(now.getDate()+(day===0?-6:1-day)); mon.setHours(0,0,0,0);
            const sun = new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
            const snap = await db.collection('attendance').where('scanned_at','>=',mon).where('scanned_at','<=',sun).get();
            const batch = db.batch();
            snap.forEach(d=>batch.delete(d.ref));
            await batch.commit();
            showToast(`✅ Deleted ${snap.size} records`);
            loadAttendance();
        };
        
        loadStudentMap().then(loadAttendance);
        setInterval(()=>loadStudentMap().then(loadAttendance), 60000);
    </script>
</body>
</html>
