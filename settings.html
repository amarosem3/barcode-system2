<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLLCALL - Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1219; font-family: 'Inter', sans-serif; color: #e0e0e0; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: #0a0d14; border-right: 1px solid #1e2433; position: fixed; height: 100vh; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid #1e2433; }
        .sidebar-header h2 { background: linear-gradient(135deg, #00f2fe, #4facfe); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-menu { padding: 1rem 0; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: #a0a8c0; text-decoration: none; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #1a1f2e; border-left-color: #00f2fe; color: #00f2fe; }
        .main-content { flex: 1; margin-left: 280px; padding: 1.5rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #1e2433; }
        .logout-btn { background: #1e2433; padding: 0.5rem 1rem; border-radius: 8px; border: none; color: #e0e0e0; cursor: pointer; }
        .logout-btn:hover { background: #ff1744; color: white; }
        .card { background: #1a1f2e; border-radius: 16px; border: 1px solid #1e2433; margin-bottom: 1.5rem; overflow: hidden; }
        .card-header { background: #151b26; padding: 1rem 1.25rem; border-bottom: 1px solid #1e2433; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .card-header i { color: #00f2fe; }
        .card-body { padding: 1.25rem; }
        .form-control { background: #2a3442; border: 1px solid #3a4557; padding: 0.7rem 1rem; border-radius: 10px; color: #e0e0e0; width: auto; }
        .btn { background: #2a3442; border: 1px solid #3a4557; padding: 0.6rem 1.2rem; border-radius: 10px; cursor: pointer; color: #e0e0e0; }
        .btn-primary { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #0a0f1f; border: none; }
        .setting-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .setting-label { width: 180px; font-weight: 500; color: #00f2fe; }
        .current-value { background: #2a3442; padding: 0.5rem 1rem; border-radius: 8px; }
        .radio-group, .theme-group { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .info-text { font-size: 0.8rem; color: #6c7a91; margin-top: 0.5rem; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar-header h2, .nav-item span { display: none; } .main-content { margin-left: 70px; } .setting-label { width: 100%; }
